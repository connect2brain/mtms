[[package]]
name = "confluent-kafka"
version = "1.7.0"
description = "Confluent's Python client for Apache Kafka"
category = "main"
optional = false
python-versions = "*"

[package.extras]
avro = ["requests", "fastavro (>=0.23.0,<1.0)", "avro (==1.10.0)", "fastavro (>=1.0)", "avro-python3 (==1.10.0)"]
