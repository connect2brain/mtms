name: Update docs

on: [pull_request, workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      - name: Clone the repository for the docs
        run: cd docs && git clone https://github.com/connect2brain/project-louhi-docs public

      - name: Install Node dependencies
        run: sudo npm install -g @asyncapi/generator openapi-sampler

      - name: Install Python dependencies
        run: cd docs && sudo pip install pip-tools && pip-compile requirements.in && sudo pip install -r requirements.txt

      # Runs a single command using the runners shell
      - name: Build and deploy the documentation
        run: cd docs && sh deploy.sh
