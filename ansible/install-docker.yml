---
- name: Install Docker Engine and Docker Compose Plugin on Ubuntu 24.04
  hosts: all
  become: yes
  connection: local

  vars:
    docker_keyring_path: /etc/apt/keyrings/docker.asc
    docker_repo_url: https://download.docker.com/linux/ubuntu
    docker_repo_file: /etc/apt/sources.list.d/docker.list
    docker_apt_arch: "{{ 'arm64' if ansible_facts.architecture == 'aarch64' else 'amd64' }}"
    target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env','USER'), true) }}"
    apt_connectivity_urls:
      - https://archive.ubuntu.com/ubuntu/dists/noble/Release
      - https://security.ubuntu.com/ubuntu/dists/noble-security/Release
      - https://download.docker.com/linux/ubuntu/dists/noble/Release

  tasks:
    # -------------------------------------------------------------------------
    # 0) Guardrails
    # -------------------------------------------------------------------------
    - name: Assert Ubuntu 24.04 / noble
      assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
          - ansible_facts.distribution_release == "noble"
        fail_msg: >-
          This playbook is intended for Ubuntu 24.04 (noble).
          Detected {{ ansible_facts.distribution }} {{ ansible_facts.distribution_release }}

    - name: Preflight check repository reachability
      ansible.builtin.uri:
        url: "{{ item }}"
        method: GET
        return_content: no
        timeout: 8
        status_code: 200
      register: repo_reachability
      changed_when: false
      retries: 4
      delay: 3
      until: repo_reachability is succeeded
      loop: "{{ apt_connectivity_urls }}"
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: Fail fast when package repositories are unreachable
      ansible.builtin.assert:
        that:
          - repo_reachability.results | selectattr('failed', 'defined') | selectattr('failed') | list | length == 0
        fail_msg: >-
          One or more package repositories are unreachable before apt operations.
          This usually indicates temporary internet/DNS/proxy/captive-portal issues.
          Failed URLs: {{
            repo_reachability.results
            | selectattr('failed', 'defined')
            | selectattr('failed')
            | map(attribute='item')
            | list
            | join(', ')
          }}

    # -------------------------------------------------------------------------
    # 1) Install prerequisites
    # -------------------------------------------------------------------------
    - name: Ensure prerequisites are installed
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    # -------------------------------------------------------------------------
    # 2) Remove legacy/conflicting Docker packages and sources
    # -------------------------------------------------------------------------
    - name: Remove conflicting Docker packages
      apt:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - podman-docker
          - containerd
          - runc
        state: absent
      ignore_errors: true

    - name: Remove legacy Docker apt source files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/docker-ce.list
        - /etc/apt/sources.list.d/docker-engine.list
      ignore_errors: true

    - name: Remove any Docker repo lines from main sources.list
      lineinfile:
        path: /etc/apt/sources.list
        regexp: '.*download\.docker\.com/linux/ubuntu.*'
        state: absent
      ignore_errors: true

    # -------------------------------------------------------------------------
    # 3) Add Docker GPG key
    # -------------------------------------------------------------------------
    - name: Ensure directory for APT keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: "{{ docker_repo_url }}/gpg"
        dest: "{{ docker_keyring_path }}"
        mode: '0644'
        force: true

    # -------------------------------------------------------------------------
    # 4) Add Docker apt repository
    # -------------------------------------------------------------------------
    - name: Configure Docker apt repository
      copy:
        dest: "{{ docker_repo_file }}"
        mode: '0644'
        content: |
          deb [arch={{ docker_apt_arch }} signed-by={{ docker_keyring_path }}] {{ docker_repo_url }} {{ ansible_facts.distribution_release }} stable

    # -------------------------------------------------------------------------
    # 5) Update apt cache (force — no cache_valid_time so the new repo is seen)
    # -------------------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: yes

    # -------------------------------------------------------------------------
    # 6) Install Docker packages
    # -------------------------------------------------------------------------
    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    # -------------------------------------------------------------------------
    # 7) Ensure user is in docker group
    # -------------------------------------------------------------------------
    - name: Ensure docker group exists
      group:
        name: docker
        state: present

    - name: Add user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: yes

    # -------------------------------------------------------------------------
    # 8) Enable and start service
    # -------------------------------------------------------------------------
    - name: Ensure Docker service is enabled and started
      service:
        name: docker
        enabled: yes
        state: started