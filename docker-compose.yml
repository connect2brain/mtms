version: '2'

services:
  front:
    build:
      context: .
      dockerfile: front/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - './front:/app'
      - '/app/node_modules'
    network_mode: host

  rosbridge:
    build:
      context: .
      dockerfile: ros2_ws/src/bridges/rosbridge/Dockerfile
    ports:
      - "9090:9090"
    network_mode: host

  bag_exporter:
    build:
      context: .
      dockerfile: ros2_ws/src/other/bag_exporter/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './projects/$PROJECT_NAME:/app/project'
    network_mode: host

  bag_recorder:
    build:
      context: .
      dockerfile: ros2_ws/src/other/bag_recorder/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      - PROJECT_NAME=$PROJECT_NAME
    volumes:
      - './projects:/app/projects'
    network_mode: host

  eeg_gatherer:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg/eeg_gatherer/Dockerfile
    env_file:
      - ${ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  mep_analyzer:
    build:
      context: .
      dockerfile: ros2_ws/src/mep/mep_analyzer/Dockerfile
    env_file:
      - ${ENV_FILE}
    network_mode: host

  eeg_simulator:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg/eeg_simulator/Dockerfile
    env_file:
      - ${ENV_FILE}
    # this option is needed for the container to achieve the same performance as without docker. Optionally, also
    # privileged: true can be used
    security_opt:
      - seccomp:unconfined
    volumes:
      - './ros2_ws/src/eeg/eeg_simulator:/app/ros2_ws/src/eeg/eeg_simulator/'
      - './data/eeg:/app/data/eeg/'
    network_mode: host

  eeg_preprocessor:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg/eeg_processor/Dockerfile
    entrypoint: 'bash /app/ros2_ws/eeg_preprocessor_entrypoint.sh'
    env_file:
      - ${ENV_FILE}
    environment:
      - PROJECT_DIR=/app/projects/$PROJECT_NAME/
    volumes:
      - './projects:/app/projects'
      - './pipeline:/app/ros2_ws/pipeline/'
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  eeg_processor:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg/eeg_processor/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      - PROJECT_DIR=/app/projects/$PROJECT_NAME/
    volumes:
      - './projects:/app/projects'
      - './pipeline:/app/ros2_ws/pipeline/'
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  eeg_bridge:
    ports:
      - "50000:50000/udp"
    build:
      context: .
      dockerfile: ros2_ws/src/bridges/eeg_bridge/Dockerfile
    env_file:
      - ${ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  mtms_device_bridge:
    build:
      context: .
      dockerfile: ros2_ws/src/bridges/mtms_device_bridge/Dockerfile
    # The container needs to be privileged to access FPGA.
    privileged: true
    env_file:
      - ${ENV_FILE}
    network_mode: host

  eeg_batcher:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg/eeg_batcher/Dockerfile
    env_file:
      - ${ENV_FILE}
    privileged: true
    network_mode: host

  planner:
    build:
      context: .
      dockerfile: ros2_ws/src/ui/planner/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/ui/planner:/app/ros2_ws/src/ui/planner/'
    network_mode: host

  pulse_sequence_controller:
    build:
      context: .
      dockerfile: ros2_ws/src/ui/pulse_sequence_controller/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/ui/pulse_sequence_controller:/app/ros2_ws/src/ui/pulse_sequence_controller/'
    network_mode: host

  neuronavigation:
    build:
      context: .
      dockerfile: ros2_ws/src/neuronavigation/neuronavigation/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      - DISPLAY
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - './data/neuronavigation:/app/data/neuronavigation/'
      # Mount the configuration to local filesystem so that it is retained when the container is restarted.
      - './.config/invesalius:/root/.config/invesalius'

    # Required by Linux when opening projects in neuronavigation, otherwise segfaults.
    privileged: true
    network_mode: host

  efield:
    build:
      context: .
      dockerfile: ${DOCKERFILE_NAME:-Dockerfile}
      args:
        - DOCKERFILE_NAME=${DOCKERFILE_NAME}
    env_file:
      - ${ENV_FILE}
    volumes:
      - './data/neuronavigation:/app/data/neuronavigation/'
    network_mode: host
    tty: true 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

   
  optitrack_bridge:
    build:
      context: .
      dockerfile: ros2_ws/src/bridges/optitrack_bridge/Dockerfile
    env_file:
      - ${ENV_FILE}
    network_mode: host

  pedal_listener:
    build:
      context: .
      dockerfile: ros2_ws/src/other/pedal_listener/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the USB pedal) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}
    network_mode: host

  stimulus_presenter:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg/eeg_processor/Dockerfile
    entrypoint: 'bash /app/ros2_ws/stimulus_presenter_entrypoint.sh'
    env_file:
      - ${ENV_FILE}
    environment:
      - DISPLAY
      - PROJECT_DIR=/app/projects/$PROJECT_NAME/
    volumes:
      - './projects:/app/projects'
      - './pipeline:/app/ros2_ws/pipeline/'
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  targeting:
    build:
      context: .
      dockerfile: ros2_ws/src/targeting/targeting/Dockerfile
    env_file:
      - ${ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  topic_frequency:
    build:
      context: .
      dockerfile: ros2_ws/src/other/topic_frequency/Dockerfile
    env_file:
      - ${ENV_FILE}
    privileged: true
    network_mode: host

  trigger_controller:
    build:
      context: .
      dockerfile: ros2_ws/src/other/trigger_controller/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the trigger USB device) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}
    network_mode: host

  waveforms:
    build:
      context: .
      dockerfile: ros2_ws/src/targeting/waveforms/Dockerfile
    env_file:
      - ${ENV_FILE}
    network_mode: host
