asyncapi: 2.0.0
info:
  title: mTMS control
  version: '0.0.1'
servers:
  production:
    url: kafka_ip
    protocol: kafka
    description: Main Kafka broker
channels:
  command/stimulate_now:
    publish:
      message:
        $ref: '#/components/messages/stimulate_now'
  command/set_stimulate_params:
    publish:
      message:
        $ref: '#/components/messages/set_stimulate_params'
  command/set_stimulate_params_and_lock:
    publish:
      message:
        $ref: '#/components/messages/set_stimulate_params_and_lock'
  events/on_stimulation:
    subscribe:
      message:
        $ref: '#/components/messages/stimulation_event'
  events/on_notification:
    subscribe:
      message:
        $ref: '#/components/messages/notification_event'
  events/on_stimulate_params_changed:
    subscribe:
      message:
        $ref: '#/components/messages/stimulate_params_changed_event'
  events/on_stimulate_params_locked:
    subscribe:
      message:
        $ref: '#/components/messages/stimulation_params_locked_event'
  events/on_stimulate_params_unlocked:
    subscribe:
      message:
        $ref: '#/components/messages/stimulation_params_unlocked_event'
components:
  messages:
    stimulate_now:
      description: Runs a stimulation with the provided stimulation parameters, or fails if stimulation could not be performed before given `timeout`.
      payload:
        type: object
        additionalProperties: false
        properties:
          stimulate_params:
            description: Stimulation parameters
            $ref: '#/components/schemas/mtms/stimulate_params'
          timeout:
            description: Time, in milliseconds, after which the receiving host should fail the request, if the desired state could not be reached.
            type: integer
          timestamp:
            description: Sending client's timestamp
            $ref: '#/components/schemas/general/timestamp'
          request_id:
            description: Request id for this action.
            $ref: '#/components/schemas/general/request_id'
    set_stimulate_params:
      description: Sets the system stimulate parameters.
      payload:
        type: object
        additionalProperties: false
        properties:
          stimulate_params:
            description: Stimulation parameters
            $ref: '#/components/schemas/mtms/stimulate_params'
          timestamp:
            description: Sending client's timestamp
            $ref: '#/components/schemas/general/timestamp'
          request_id:
            description: Request id for this action.
            $ref: '#/components/schemas/general/request_id'
    set_stimulate_params_and_lock:
      description: Same as `set_stimulate_params` but locks the system against changes for fixed period of time.
      payload:
        type: object
        additionalProperties: false
        properties:
          stimulate_params:
            description: Stimulation parameters
            $ref: '#/components/schemas/mtms/stimulate_params'
          duration:
            description: Duration of locking in milliseconds.
            $ref: '#/components/schemas/general/duration'
          timestamp:
            description: Sending client's timestamp
            $ref: '#/components/schemas/general/timestamp'
          request_id:
            description: Request id for this action.
            $ref: '#/components/schemas/general/request_id'
    stimulation_event:
      payload:
        type: object
        additionalProperties: false
        properties:
          stimulate_params:
            description: Stimulation parameters used in the stimulation.
            $ref: '#/components/schemas/mtms/stimulate_params'
          channel_states_before:
            description: State of the mTMS channels right before the stimulation.
            type: array
            items:
              $ref: '#/components/schemas/mtms/channel_state'
          system_state_after:
            description: State of the mTMS system right after the stimulation.
            $ref: '#/components/schemas/mtms/system_state'
          timestamp:
            description: The timestamp when the stimulation ocurred.
            $ref: '#/components/schemas/general/timestamp'
          request_id:
            description: The request id that triggered this stimulation event. 
            $ref: '#/components/schemas/general/request_id'
            nullable: true
    notification_event:
      payload:
        type: object
        additionalProperties: false
        properties:
          notification:
            description: Notification event.
            $ref: '#/components/schemas/general/notification'
          state:
            description: State of event, ie. 'on', 'off', or 'retain'
            $ref: '#/components/schemas/general/state'
    stimulate_params_changed_event:
      payload:
          type: object
          additionalProperties: false
          properties:
            stimulate_params:
              description: Stimulation parameters after the change.
              $ref: '#/components/schemas/mtms/stimulate_params'
            timestamp:
              description: The timestamp when the values were changed.
              $ref: '#/components/schemas/general/timestamp'
            request_id:
              description: The request id that triggered this change.
              $ref: '#/components/schemas/general/request_id'
              nullable: true
    stimulation_params_locked_event:
      payload:
        type: object
        additionalProperties: false
        properties:
          stimulate_params:
            description: Stimulation parameters after the change.
            $ref: '#/components/schemas/mtms/stimulate_params'
          duration:
            description: Duration of the locking. Lock is released at `timestamp`+`duration`.
            $ref: '#/components/schemas/general/duration'
          timestamp:
            description: The timestamp when the parameters were locked.
            $ref: '#/components/schemas/general/timestamp'
          request_id:
            description: The request id that locked the parameters.
            $ref: '#/components/schemas/general/request_id'
            nullable: true
    stimulation_params_unlocked_event:
      payload:
        type: object
        additionalProperties: false
        properties:
          timestamp:
            description: The timestamp when the parameters were unlocked.
            $ref: '#/components/schemas/general/timestamp'
          request_id:
            description: The request id that originally locked the parameters.
            $ref: '#/components/schemas/general/request_id'
            nullable: true
  schemas:
    general:
      timestamp:
        type: integer
        format: long
        description: Timestamp as milliseconds from Jan 1 1970, in UTC
        min: 0
      request_id:
        type: string
        description: Unique request id for this request. Multiple requests with same id are ignored.
      notification:
        type: object
        additionalProperties: false
        properties:
          kind: 
            description: The kind (ie. type) of notification.
            type: string
            enum:
              - 'info'
              - 'warning'
              - 'error'
          value:
            description: Numeric value associated with this notification.
            type: integer
          message:
            description: Plain (English) description of the notification.
            type: string
      state:
        description: The type of event, ie 'on', 'off', or 'retain'
        type: string
        enum:
          - 'on'
          - 'off'
          - 'retain'
      duration:
        description: Duration (of time) in milliseconds.
        type: integer
        min: 0
    mtms:
      stimulate_params:
        description: Stimulation parameters for the whole system consisting of multiple channels.
        properties:
          intensity:
            description: Overall intensity for requested stimulation. Set to 0 to disable all channels.
            type: integer
            minimum: 0
          channel_params:
            description: A list of channel_configuration objects for each enabled channel 
            type: array
            items:
              $ref: '#/components/schemas/mtms/channel_params'
      channel_params:
        type: object
        description: Configuration for a single channel
        properties:
          channel_id:
            description: Unique ID of the channel
            type: integer
          intensity:
            description: Intensity of the channel as percentage from reference. Note, value can be >100. Set to 0 to disable channel.
            type: integer
            min: 0
      system_state:
        type: object
        description: Description of the mTMS system state.
        properties:
          channel_states:
            description: State of a single channel.
            type: array
            items:
              $ref: '#/components/schemas/mtms/channel_state'
          target_states:
            description: The targeted states of the channels.
            type: array
            items:
              $ref: '#/components/schemas/mtms/channel_state'
          notifications:
            description: Active notifications, ie. infos, warnings, and errors with state 'on' related to the system.
            type: array
            items:
              $ref: '#/components/schemas/general/notification'
      channel_state:
        type: object
        description: State of a single channel is system.
        properties:
          channel_id:
            description: Unique ID of the channel
            type: integer
          voltage:
            description: Voltage of the capacitor, in V.
            type: number
            format: float
          
