version: '2'

services:
  front:
    build: ./front/
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - './front:/app'
      - '/app/node_modules'
  rosbridge:
    build:
      context: .
      dockerfile: ros2_ws/src/rosbridge/Dockerfile
    ports:
      - "9090:9090"
  data_provider:
    build:
      context: .
      dockerfile: ros2_ws/src/data_provider/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/data_provider:/app/ros2_ws/src/data_provider/'
      - './ros2_ws/src/mtms_interfaces:/app/ros2_ws/src/mtms_interfaces/'
  planner:
    build:
      context: .
      dockerfile: ros2_ws/src/planner/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/mtms_interfaces:/app/ros2_ws/src/mtms_interfaces/'
      - './ros2_ws/src/planner:/app/ros2_ws/src/planner/'
  pulse_sequence_controller:
    build:
      context: .
      dockerfile: ros2_ws/src/pulse_sequence_controller/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/mtms_interfaces:/app/ros2_ws/src/mtms_interfaces/'
      - './ros2_ws/src/fpga_interfaces:/app/ros2_ws/src/fpga_interfaces/'
      - './ros2_ws/src/pulse_sequence_controller:/app/ros2_ws/src/pulse_sequence_controller/'
  neuronavigation:
    build:
      context: .
      dockerfile: ros2_ws/src/neuronavigation_pkg/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Requires by linux when opening projects, otherwise segfaults
    privileged: true
  efield:
    build:
      context: .
      dockerfile: ros2_ws/src/efield/Dockerfile
    env_file:
      - ${ENV_FILE}
  pedal_listener:
    build:
      context: .
      dockerfile: ros2_ws/src/pedal_listener/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the USB pedal) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}
  trigger_controller:
    build:
      context: .
      dockerfile: ros2_ws/src/trigger_controller/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the trigger USB device) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}
