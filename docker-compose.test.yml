version: '2'

services:
  front_test:
    build: ./front/
    ports:
      - "3001:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_ROS_URL=rosbridge_test:9090
      - CYPRESS_BASE_URL=front_test:3000
    volumes:
      - './front:/app'
      - '/app/node_modules'
  cypress:
    image: cypress/included:10.1.0
    entrypoint: cypress open --env BASE_URL=front_test:3000 --project .
    working_dir: /app
    environment:
      - DISPLAY
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - './front:/app'
  cypress_headless:
    image: cypress/included:10.1.0
    entrypoint: cypress run --env BASE_URL=front_test:3000 --project .
    working_dir: /app
    environment:
      - DISPLAY
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - './front:/app'
  rosbridge_test:
    build:
      context: .
      dockerfile: ros2_ws/src/rosbridge/Dockerfile
  planner_test:
    build:
      context: .
      dockerfile: ros2_ws/src/planner/Dockerfile
  pulse_sequence_controller_test:
    build:
      context: .
      dockerfile: ros2_ws/src/pulse_sequence_controller/Dockerfile
    volumes:
      - './ros2_ws/src/mtms_interfaces:/app/ros2_ws/src/mtms_interfaces/'
      - './ros2_ws/src/pulse_sequence_controller:/app/ros2_ws/src/pulse_sequence_controller/'
