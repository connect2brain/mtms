version: '3.5'

services:
  planner_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/ui/planner/Dockerfile

  pulse_sequence_controller_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/ui/pulse_sequence_controller/Dockerfile

  neuronavigation_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/neuronavigation/neuronavigation_pkg/Dockerfile
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Requires by linux when opening projects, otherwise segfaults
    privileged: true

  efield_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/targeting/efield/Dockerfile

  pedal_listener_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/other/pedal_listener/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the USB pedal) are created.
    privileged: true

  trigger_controller_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/other/trigger_controller/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the trigger USB device) are created.
    privileged: true

  eeg_simulator:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/eeg/eeg_simulator/Dockerfile
    volumes:
      - './ros2_ws/src/eeg/eeg_simulator:/app/ros2_ws/src/eeg/eeg_simulator/'

  eeg_processor:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/eeg/eeg_processor/Dockerfile
    privileged: true

  eeg_bridge:
    networks:
      - cinetwork
    ports:
      - "50000:50000/udp"
    build:
      context: ..
      dockerfile: ros2_ws/src/bridges/eeg_bridge/Dockerfile
    privileged: true

  fpga_bridge:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/bridges/fpga_bridge/Dockerfile
    # The container needs to be privileged to access FPGA
    privileged: true

  data_batcher:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/eeg/data_batcher/Dockerfile
    privileged: true

networks:
  cinetwork:
    name: cinetwork
    driver: bridge
