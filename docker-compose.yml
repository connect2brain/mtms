version: '2'

services:
  front:
    build: ./front/
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - './front:/app'
      - '/app/node_modules'

  rosbridge:
    build:
      context: .
      dockerfile: ros2_ws/src/rosbridge/Dockerfile
    ports:
      - "9090:9090"

  eeg_simulator:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg_simulator/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/eeg_simulator:/app/ros2_ws/src/eeg_simulator/'
      - './oscillation_data.csv:/app/ros2_ws/src/eeg_simulator/oscillation_data.csv'

  eeg_processor:
    build:
      context: .
      dockerfile: ros2_ws/src/eeg_processor/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './hotswappable_processors:/app/ros2_ws/hotswappable_processors/'
    # The container needs to be privileged to set real-time priority.
    privileged: true

  eeg_bridge:
    ports:
      - "50000:50000/udp"
    build:
      context: .
      dockerfile: ros2_ws/src/eeg_bridge/Dockerfile
    env_file:
      - ${ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true

  fpga_bridge:
    build:
      context: .
      dockerfile: ros2_ws/src/fpga_bridge/Dockerfile
    # The container needs to be privileged to access FPGA.
    privileged: true
    env_file:
      - ${ENV_FILE}

  data_batcher:
    build:
      context: .
      dockerfile: ros2_ws/src/data_batcher/Dockerfile
    env_file:
      - ${ENV_FILE}
    privileged: true

  planner:
    build:
      context: .
      dockerfile: ros2_ws/src/planner/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/planner:/app/ros2_ws/src/planner/'

  pulse_sequence_controller:
    build:
      context: .
      dockerfile: ros2_ws/src/pulse_sequence_controller/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - './ros2_ws/src/pulse_sequence_controller:/app/ros2_ws/src/pulse_sequence_controller/'

  neuronavigation:
    build:
      context: .
      dockerfile: ros2_ws/src/neuronavigation_pkg/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Required by Linux when opening projects in neuronavigation, otherwise segfaults.
    privileged: true

  efield:
    build:
      context: .
      dockerfile: ros2_ws/src/efield/Dockerfile
    env_file:
      - ${ENV_FILE}

  pedal_listener:
    build:
      context: .
      dockerfile: ros2_ws/src/pedal_listener/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the USB pedal) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}

  targeting:
    build:
      context: .
      dockerfile: ros2_ws/src/targeting/Dockerfile
    env_file:
      - ${ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: "host"

  trigger_controller:
    build:
      context: .
      dockerfile: ros2_ws/src/trigger_controller/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the trigger USB device) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}
