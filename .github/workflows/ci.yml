# .github/workflows/ci.yml
name: CI

on:
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-20.04
    needs: build
    env:
      COMPOSE_FILE: .github/ci/docker-compose.test.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          lfs: true
          submodules: recursive

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker images
        run: docker-compose -f ${{ env.COMPOSE_FILE }} build --cache-from type=local,src=/tmp/.buildx-cache --cache-to type=local,dest=/tmp/.buildx-cache

      - name: Start containers
        run: docker-compose -f ${{ env.COMPOSE_FILE }} up -d

      - name: Run Cypress tests
        uses: cypress-io/github-action@v4
        with:
          working-directory: front

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-screenshots
          path: front/cypress/screenshots

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-videos
          path: front/cypress/videos

      - name: Create Docker compose logs
        run: docker-compose -f ${{ env.COMPOSE_FILE }} logs > docker-compose.log
        if: failure()

      - name: Upload Docker compose logs
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: docker-logs
          path: docker-compose.log
