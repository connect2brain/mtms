version: '2'

networks:
  kafka:
    driver: bridge
  backend:
    driver: bridge

services:
  # NB: Zookeeper and Kafka containers are reset when the services are shut down, which means
  #   that everything stored in Kafka is lost. This is good enough for development at this stage,
  #   but change the behavior later to retain the data.
  zookeeper:
    image: 'bitnami/zookeeper:latest'
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - kafka
  kafka:
    image: 'bitnami/kafka:latest'
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
    networks:
      - kafka
  backend:
    build:
      context: .
      dockerfile: py/backend/Dockerfile
    restart: always
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    environment:
      - KAFKA_IP=kafka
      - KAFKA_PORT=9092
    volumes:
      - ./py/backend:/code/py/backend
      - ./py/packages:/code/py/packages
    depends_on:
      - kafka
    networks:
      - kafka
      - backend
  mtms_bridge:
    build:
      context: .
      dockerfile: py/mtms_bridge/Dockerfile
    restart: always
    ports:
      - "${MTMS_BRIDGE_PORT}:${MTMS_BRIDGE_PORT}"
    env_file:
      - .env
    environment:
      - KAFKA_IP=kafka
      - KAFKA_PORT=9092
    volumes:
      - ./py/mtms_bridge:/code/py/mtms_bridge
      - ./py/packages:/code/py/packages
    depends_on:
      - kafka
    networks:
      - kafka
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    # TODO: Change hard-coded port to a port read from .env
    ports:
      - "8080:8080"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - backend
