version: '2'

services:
  front:
    build: ./front/
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - './front:/app'
      - '/app/node_modules'
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    # TODO: Change hard-coded port to a port read from the env file
    ports:
      - "8080:8080"
    environment:
      # Fixes hot reload when using Windows/Mac. An explanation:
      #
      # https://daten-und-bass.io/blog/enabling-hot-reloading-with-vuejs-and-vue-cli-in-docker/
      #
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend/src:/app/src
  rosbridge:
    build:
      context: .
      dockerfile: ros2_ws/src/rosbridge/Dockerfile
    ports:
      - "9090:9090"
  planner:
    build:
      context: .
      dockerfile: ros2_ws/src/planner/Dockerfile
  neuronavigation:
    build:
      context: .
      dockerfile: ros2_ws/src/neuronavigation_pkg/Dockerfile
    env_file:
      - ${ENV_FILE}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Requires by linux when opening projects, otherwise segfaults
    privileged: true
  efield:
    build:
      context: .
      dockerfile: ros2_ws/src/efield/Dockerfile
    env_file:
      - ${ENV_FILE}
  pedal_listener:
    build:
      context: .
      dockerfile: ros2_ws/src/pedal_listener/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the USB pedal) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}
  trigger_controller:
    build:
      context: .
      dockerfile: ros2_ws/src/trigger_controller/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the trigger USB device) are created.
    privileged: true
    env_file:
      - ${ENV_FILE}
