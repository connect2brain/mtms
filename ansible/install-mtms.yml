---
- name: Setup mTMS environment
  hosts: localhost
  connection: local
  become: yes
  vars_files:
    - vars/samplicator.yml

  vars:
    # The non-root user that invoked sudo (fallback to current USER if unset).
    target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    target_home: "/home/{{ target_user }}"
    # Location where mTMS experiment logs are stored.
    mtms_experiment_logs_dir: "{{ target_home }}/mtms_experiment_logs"

    # The repository root.
    repo_root: "{{ playbook_dir | dirname }}"

    # ROS distro
    ros_distro: "jazzy"
    pip_extra_args: "--break-system-packages"

    # EEG UDP fanout settings
    eeg_udp_fanout_source_port: 50000
    eeg_udp_fanout_destinations:
      - 127.0.0.1/50001
      - 127.0.0.1/50002

  collections:
    - community.general

  tasks:
    ########################################################################
    # Preflight checks
    ########################################################################
    - name: Assert Ubuntu 24.04 / noble
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
          - ansible_facts.distribution_release == "noble"
        fail_msg: >-
          This playbook is intended for Ubuntu 24.04 (noble).
          Detected {{ ansible_facts.distribution }} {{ ansible_facts.distribution_release }}

    ########################################################################
    # 1. Configure network
    ########################################################################
    - name: Configure static network settings
      community.general.nmcli:
        conn_name: Wired connection 1
        state: present
        type: ethernet
        ip4: "192.168.200.221/24"
        gw4: "192.168.200.1"
        dns4: "192.168.200.1"
        method4: manual
        autoconnect: yes

    - name: Disable automatic DNS and routes
      ansible.builtin.command:
        cmd: nmcli con modify 'Wired connection 1' ipv4.ignore-auto-dns yes ipv4.ignore-auto-routes yes
      become: yes

    - name: Activate Wired connection 1
      community.general.nmcli:
        conn_name: Wired connection 1
        state: up
      become: yes

    ########################################################################
    # 2. Update sudoers for systemd service restart without password
    ########################################################################
    - name: Allow user to restart mtms containers without sudo password
      lineinfile:
        path: /etc/sudoers.d/restart_mtms
        line: "{{ target_user }} ALL=(ALL) NOPASSWD: /bin/systemctl restart mtms"
        create: yes
        mode: '0440'

    - name: Allow user to restart mtms bridge without sudo password
      lineinfile:
        path: /etc/sudoers.d/restart_mtms
        line: "{{ target_user }} ALL=(ALL) NOPASSWD: /bin/systemctl restart mtms-bridge"
        create: yes
        mode: '0440'

    ########################################################################
    # 3. Install NI drivers
    ########################################################################
    - name: Ensure target directory exists
      ansible.builtin.file:
        path: /tmp/ni-drivers
        state: directory

    - name: Download NI driver ZIP
      ansible.builtin.command:
        cmd: wget -q --show-progress -O /tmp/ni-drivers/NILinux2026Q1DeviceDrivers.zip https://download.ni.com/support/softlib/MasterRepository/LinuxDrivers2026Q1/NILinux2026Q1DeviceDrivers.zip

    - name: Unzip NI drivers
      ansible.builtin.unarchive:
        src: /tmp/ni-drivers/NILinux2026Q1DeviceDrivers.zip
        dest: /tmp/ni-drivers
        remote_src: yes

    - name: Install NI repository registration package
      ansible.builtin.apt:
        deb: /tmp/ni-drivers/NILinux2026Q1DeviceDrivers/ni-ubuntu2404-drivers-2026Q1.deb

    - name: Refresh package list
      ansible.builtin.apt:
        update_cache: yes

    - name: Install NI driver package (ni-rseries)
      ansible.builtin.apt:
        name: ni-rseries
        state: present

    - name: Install NI Hardware Configuration Utility
      ansible.builtin.apt:
        name: ni-hwcfg-utility
        state: present

    - name: Build NI kernel drivers
      ansible.builtin.command:
        cmd: dkms autoinstall

    ########################################################################
    # 4. Copy & enable systemd services (mtms & mtms-bridge)
    ########################################################################
    - name: Copy mtms.service
      template:
        src: files/mtms.service.j2
        dest: /etc/systemd/system/mtms.service
        owner: root
        group: root
        mode: '0644'

    - name: Copy mtms-bridge.service
      template:
        src: files/mtms-bridge.service.j2
        dest: /etc/systemd/system/mtms-bridge.service
        owner: root
        group: root
        mode: '0644'

    - name: Copy eeg-udp-fanout.service
      template:
        src: files/eeg-udp-fanout.service.j2
        dest: /etc/systemd/system/eeg-udp-fanout.service
        owner: root
        group: root
        mode: '0644'

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable mtms.service
      systemd:
        name: mtms.service
        enabled: yes

    - name: Enable mtms-bridge.service
      systemd:
        name: mtms-bridge.service
        enabled: yes

    - name: Enable eeg-udp-fanout.service
      systemd:
        name: eeg-udp-fanout.service
        enabled: yes

    - name: Restart mtms.service
      systemd:
        name: mtms.service
        state: restarted

    - name: Restart mtms-bridge.service
      systemd:
        name: mtms-bridge.service
        state: restarted

    - name: Restart eeg-udp-fanout.service
      systemd:
        name: eeg-udp-fanout.service
        state: restarted

    ########################################################################
    # Create directory for mTMS experiment logs
    ########################################################################
    - name: Create mTMS experiment logs directory
      file:
        path: "{{ mtms_experiment_logs_dir }}"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'
        
    ########################################################################
    # 5. Create .bash_mtms and ensure it is sourced in .bashrc
    ########################################################################
    - name: Create fresh .bash_mtms file
      copy:
        dest: "{{ target_home }}/.bash_mtms"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        content: |
          # mTMS environment configuration
          # This file is managed by Ansible - do not edit manually

          # Add mTMS scripts to PATH
          export PATH=$PATH:{{ repo_root }}/scripts/

          # mTMS root directory
          export MTMS_ROOT={{ repo_root }}

          # Location where mTMS experiment logs are stored
          export MTMS_EXPERIMENT_LOGS_DIR={{ mtms_experiment_logs_dir }}

          # .env file used by docker-compose/systemd scripts
          export MTMS_ENV_FILE={{ repo_root }}/.env

          # ROS2 middleware configuration
          export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
          export CYCLONEDDS_URI={{ repo_root }}/config/cyclonedds.xml

          # Source local ROS workspace if it exists
          if [ -f {{ repo_root }}/install/local_setup.bash ]; then
              source {{ repo_root }}/install/local_setup.bash
          fi

          # Python API (used by scripts and integrations)
          export PYTHONPATH={{ repo_root }}/api/python:$PYTHONPATH

          # Export selected ROS variables from .env file if it exists
          if [ -f {{ repo_root }}/.env ]; then
              # Import values into the shell.
              source {{ repo_root }}/.env

              # Export ROS_DOMAIN_ID if set.
              if [ "${ROS_DOMAIN_ID+x}" = "x" ]; then
                  export ROS_DOMAIN_ID="${ROS_DOMAIN_ID}"
              fi

              # Export ROS_LOG_LEVEL if set.
              if [ "${ROS_LOG_LEVEL+x}" = "x" ]; then
                  export ROS_LOG_LEVEL="${ROS_LOG_LEVEL}"
              fi
          fi

    - name: Ensure ROS2 base installation is sourced in .bashrc
      lineinfile:
        dest: "{{ target_home }}/.bashrc"
        line: "source /opt/ros/{{ ros_distro }}/setup.bash"
        state: present
        insertafter: EOF

    - name: Ensure .bash_mtms is sourced in .bashrc
      lineinfile:
        dest: "{{ target_home }}/.bashrc"
        line: "source {{ target_home }}/.bash_mtms"
        state: present
        insertafter: EOF

    ########################################################################
    # 6. Install busylight-for-humans
    ########################################################################
    - name: Install busylight-for-humans
      pip:
        name: busylight-for-humans
        extra_args: "{{ pip_extra_args }}"

    - name: Generate Busylight udev rules (locally)
      shell: busylight udev-rules -o /tmp/99-busylights.rules
      args:
        creates: /tmp/99-busylights.rules

    - name: Deploy 99-busylights.rules
      copy:
        src: /tmp/99-busylights.rules
        dest: /etc/udev/rules.d/99-busylights.rules
        owner: root
        group: root
        mode: '0644'

    - name: Reload udev rules
      shell: udevadm control -R

    ########################################################################
    # 7. Install extra packages
    ########################################################################
    - name: Install software-properties-common (for apt repository management)
      apt:
        name: software-properties-common
        state: present

    - name: Add deadsnakes PPA for Python 3.10 packages
      ansible.builtin.apt_repository:
        repo: ppa:deadsnakes/ppa
        state: present
        update_cache: yes

    - name: Install extra packages
      apt:
        name:
          - python3.10  # Required for building ROS2 packages for MATLAB
          - python3.10-venv
          - python3.10-dev
          - gcc-12
          - g++-12
          - python3-venv
          - python3-pip
        state: present

    - name: Install Python packages
      pip:
        name:
          - Cython  # Required for building ROS2 packages for neuronavigation
        extra_args: "{{ pip_extra_args }}"

    ########################################################################
    # 8. Install Sphinx requirements
    ########################################################################
    - name: Install Sphinx requirements
      pip:
        requirements: "{{ repo_root }}/docs/sphinx-requirements.txt"
        extra_args: "{{ pip_extra_args }}"

    ########################################################################
    # 9. Install Node.js 18 LTS for Electron app build
    ########################################################################
    - name: Remove old Node.js packages
      apt:
        name:
          - nodejs
          - libnode-dev
          - libnode72
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Check if NodeSource repository is configured
      stat:
        path: /etc/apt/sources.list.d/nodesource.list
      register: nodesource_repo

    - name: Download and run NodeSource setup script
      shell: curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      when: not nodesource_repo.stat.exists

    - name: Install Node.js 18 from NodeSource
      apt:
        name: nodejs
        state: present
        update_cache: yes

    ########################################################################
    # 10. Configure GRUB timeout
    ########################################################################
    - name: Ensure GRUB timeout is set to 1
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_TIMEOUT='
        line: 'GRUB_TIMEOUT=1'

    - name: Update GRUB configuration
      ansible.builtin.command:
        cmd: update-grub

    ########################################################################
    # 11. Configure log rotation for rsyslog
    #
    # Allows at most four rotated log files, each sized at most 5G, resulting
    # in at most 20G of each log and its rotations, and checks daily if the logs
    # should be rotated.
    ########################################################################
    - name: Ensure logrotate configuration for rsyslog has 'rotate 4'
      ansible.builtin.lineinfile:
        path: /etc/logrotate.d/rsyslog
        regexp: '^\s*rotate\s+\d+'
        line: '        rotate 4'
        backup: yes

    - name: Ensure logrotate configuration for rsyslog has 'daily'
      ansible.builtin.lineinfile:
        path: /etc/logrotate.d/rsyslog
        regexp: '^\s*weekly'
        line: '        daily'
        backup: yes

    - name: Ensure logrotate configuration for rsyslog has 'size 5G'
      ansible.builtin.lineinfile:
        path: /etc/logrotate.d/rsyslog
        regexp: '^\s*size\s+\d+[KMG]?'
        line: '        size 5G'
        backup: yes

    ########################################################################
    # 12. Configure MATLAB startup path
    ########################################################################
    - name: Ensure MATLAB startup directory exists
      file:
        path: "{{ target_home }}/Documents/MATLAB"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    - name: Ensure mTMS MATLAB API path is added in startup.m
      lineinfile:
        path: "{{ target_home }}/Documents/MATLAB/startup.m"
        line: "addpath('{{ repo_root }}/api/matlab');"
        create: yes
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0644'
        state: present
        insertafter: EOF

    ########################################################################
    # 13. Create a desktop link to the documentation
    ########################################################################
    - name: Create a desktop link to the documentation
      copy:
        dest: "/home/{{ target_user }}/Desktop/mTMS Documentation.desktop"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=mTMS Documentation
          Icon=application-x-html
          Exec=xdg-open file:///home/{{ target_user }}/mtms/docs/build/html/index.html

    - name: Set ownership, permissions, and trust the desktop file
      file:
        path: "/home/{{ target_user }}/Desktop/mTMS Documentation.desktop"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'
        state: file

    - name: Mark the desktop file as trusted
      become_user: "{{ target_user }}"
      command: >
        gio set "/home/{{ target_user }}/Desktop/mTMS Documentation.desktop"
        metadata::trusted true
