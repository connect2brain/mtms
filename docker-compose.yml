version: '3.9'

services:
  busylight_manager:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/utility/busylight_manager/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    network_mode: host
    # The container needs to be privileged to access the USB device.
    #
    # Note: Just mapping the device /dev/hidraw4 inside the container does not work properly.
    privileged: true


  experiment_performer:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/experiment/experiment_performer/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  pedal_listener:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/utility/pedal_listener/Dockerfile
    # The container needs to be privileged so that /dev devices (namely, the USB pedal) are created.
    privileged: true
    env_file:
      - ${SITE_ENV_FILE}
    network_mode: host

  stimulation_allower:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/mtms/stimulation_allower/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  targeting:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/targeting/targeting/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  trial_logger:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/experiment/trial_logger/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    volumes:
      - '$PROJECTS_ROOT:/app/projects'
    network_mode: host

  trial_performer:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/experiment/trial_performer/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  trial_validator:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/experiment/trial_validator/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  voltage_setter:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/mtms/voltage_setter/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  waveforms:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/targeting/waveform_utils/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    network_mode: host

  waveform_approximator:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/targeting/waveform_approximator/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    volumes:
      # Mount the whole MATLAB installation into the container; this is needed for the container
      # to be able to find MATLAB license (located in /usr/local/MATLAB/[version]/licenses/).
      #
      # A better solution would be to mount only the license file, but the MATLAB version is defined
      # site-specific .env file (e.g., sites/Aalto/.env), which is not easily available for
      # docker-compose.yml, but only for Dockerfile.
      - '/usr/local/MATLAB:/usr/local/MATLAB'
    network_mode: host

  # MEP-related services
  eeg_gatherer:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/mep/eeg_gatherer/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    # The container needs to be privileged to set real-time priority.
    privileged: true
    network_mode: host

  mep_analyzer:
    build:
      context: .
      dockerfile: ros2_ws/src/mtms_packages/mep/mep_analyzer/Dockerfile
    env_file:
      - ${SITE_ENV_FILE}
    network_mode: host
