version: '2'

networks:
  kafka:
    driver: bridge
  backend:
    driver: bridge

services:
  # NB: Zookeeper and Kafka containers are reset when the services are shut down, which means
  #   that everything stored in Kafka is lost. This is good enough for development at this stage,
  #   but change the behavior later to retain the data.
  zookeeper:
    image: 'bitnami/zookeeper:3.7.0-debian-10-r30'
    environment:
      - ZOO_PORT_NUMBER=${ZOOKEEPER_PORT}
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - kafka
  kafka:
    image: 'bitnami/kafka:2.8.0-debian-10-r8'
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:${KAFKA_PORT}
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:${KAFKA_PORT}
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:${ZOOKEEPER_PORT}
    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"
    depends_on:
      - zookeeper
    networks:
      - kafka
  # Needs to match the value of INIT_HOST environment variable.
  init:
    build:
      context: .
      dockerfile: py/init/Dockerfile
    env_file:
      - ${ENV_FILE}
    environment:
      - KAFKA_IP=kafka
      - KAFKA_PORT=${KAFKA_PORT}
    volumes:
      - ./py/init:/code/py/init
      - ./py/packages:/code/py/packages
    depends_on:
      - kafka
    networks:
      - kafka
  # Needs to match the value of BACKEND_HOST environment variable.
  backend:
    build:
      context: .
      dockerfile: py/backend/Dockerfile
    restart: always
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ${ENV_FILE}
    environment:
      - KAFKA_IP=kafka
      - KAFKA_PORT=${KAFKA_PORT}
    volumes:
      - ./py/backend:/code/py/backend
      - ./py/packages:/code/py/packages
    depends_on:
      - kafka
    networks:
      - kafka
      - ${BACKEND_HOST}
  eeg:
    build:
      context: .
      dockerfile: py/eeg/Dockerfile
    restart: always
    env_file:
      - ${ENV_FILE}
    environment:
      - KAFKA_IP=kafka
      - KAFKA_PORT=${KAFKA_PORT}
    volumes:
      - ./py/eeg:/code/py/eeg
      - ./py/packages:/code/py/packages
      # TODO: There are two directories for EEG data: the upper is for downloaded example
      #       EEG data and the lower for EEG data used in tests. Maybe have a single path
      #       under the root directory for all datasets instead?
      - ./scripts/datasets:/code/eeg/datasets
      - ./datasets:/code/datasets
    depends_on:
      - kafka
    networks:
      - kafka
  mtms_bridge:
    build:
      context: .
      dockerfile: py/mtms_bridge/Dockerfile
    restart: always
    ports:
      - "${MTMS_BRIDGE_PORT}:${MTMS_BRIDGE_PORT}"
    env_file:
      - ${ENV_FILE}
    environment:
      - KAFKA_IP=kafka
      - KAFKA_PORT=${KAFKA_PORT}
    volumes:
      - ./py/mtms_bridge:/code/py/mtms_bridge
      - ./py/packages:/code/py/packages
    depends_on:
      - kafka
    networks:
      - kafka
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    # TODO: Change hard-coded port to a port read from the env file
    ports:
      - "8080:8080"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - ${BACKEND_HOST}
    networks:
      - ${BACKEND_HOST}
