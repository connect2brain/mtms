version: '3.5'

services:
  planner:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/planner/Dockerfile

  pulse_sequence_controller:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/pulse_sequence_controller/Dockerfile

  neuronavigation:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/neuronavigation_pkg/Dockerfile

  efield:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/efield/Dockerfile

  pedal_listener:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/pedal_listener/Dockerfile

  trigger_controller:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/trigger_controller/Dockerfile

  eeg_simulator:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/eeg_simulator/Dockerfile

  eeg_processor:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/eeg_processor/Dockerfile

  eeg_bridge:
    networks:
      - cinetwork
    ports:
      - "50000:50000/udp"
    build:
      context: ..
      dockerfile: ros2_ws/src/eeg_bridge/Dockerfile

  fpga_bridge:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/fpga_bridge/Dockerfile

  data_batcher:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/data_batcher/Dockerfile

  optitrack_bridge:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/optitrack_bridge/Dockerfile

networks:
  cinetwork:
    name: cinetwork
    driver: bridge