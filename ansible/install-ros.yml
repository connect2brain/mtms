---
- name: Install ROS 2 Jazzy on Ubuntu
  hosts: localhost
  become: yes
  connection: local
  vars:
    ros_distro: jazzy
  tasks:
    - name: Install software-properties-common
      apt:
        name: software-properties-common
        state: present
        update_cache: yes

    - name: Install curl
      apt:
        name: curl
        state: present

    - name: Get latest ros-apt-source version
      shell: >
        curl -s https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest
        | grep -F "tag_name" | awk -F\" '{print $4}'
      register: ros_apt_source_version
      changed_when: false

    - name: Download ros2-apt-source deb
      get_url:
        url: "https://github.com/ros-infrastructure/ros-apt-source/releases/download/{{ ros_apt_source_version.stdout }}/ros2-apt-source_{{ ros_apt_source_version.stdout }}.{{ ansible_facts.lsb.codename }}_all.deb"
        dest: /tmp/ros2-apt-source.deb

    - name: Install ros2-apt-source deb
      apt:
        deb: /tmp/ros2-apt-source.deb

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade system packages
      apt:
        upgrade: dist

    - name: Install ROS 2 base, dev tools, and Cyclone DDS
      apt:
        name:
          - "ros-{{ ros_distro }}-ros-base"
          - "ros-{{ ros_distro }}-rmw-cyclonedds-cpp"
          - "ros-{{ ros_distro }}-cyclonedds"
          - ros-dev-tools
        state: present
