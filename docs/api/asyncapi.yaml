asyncapi: 2.0.0
info:
  title: mTMS control
  version: '0.0.1'
servers:
  production:
    url: kafka_ip
    protocol: kafka
    description: Main Kafka broker
channels:
  command/stimulate_now:
    publish:
      message:
        $ref: '#/components/messages/stimulate_now_msg'
components:
  messages:
    stimulate_now_msg:
      payload:
        type: object
        additionalProperties: false
        properties:
          stimulate_params:
            description: Stimulation parameters
            $ref: '#/components/messages/stimulate_params_msg'
          timeout:
            descrption: Time, in milliseconds, after which the receiving host should fail the request, if the desired state could not be reached.
            type: integer
          timestamp:
            description: Sending client's timestamp
            $ref: '#/components/schemas/general/timestamp'
    stimulate_params_msg:
      payload:
        type: object
        additionalProperties: false
        properties:
          intensity:
            description: Overall intensity for requested stimulation. Set to 0 to disable all channels.
            type: integer
            minimum: 0
          channel_configurations:
            description: A list of channel_configuration objects for each enabled channel 
            type: array
            items:
              $ref: '#/components/schemas/mtms/channel_configuration'
  schemas:
    general:
      timestamp:
        type: integer
        description: Timestamp as milliseconds from Jan 1 1970, in UTC
    mtms:
      channel_configuration:
        type: object
        description: Configuration
        properties:
          channel_id:
            description: Unique ID of the channel
            type: integer
          intensity:
            description: Intensity of the channel as percentage from reference. Note, value can be >100. Set to 0 to disable channel.
            type: integer
            min: 0
