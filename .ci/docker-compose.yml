version: '3.5'

services:
  front_test:
    build: ../front/
    entrypoint: [ "yarn", "test" ]
    networks:
      - cinetwork
    ports:
      - "3001:3000"
    depends_on:
      - rosbridge_test
      - planner_test
      - pulse_sequence_controller_test
  cypress_headless:
    # image: cypress/included:10.2.0
    build:
      context: ..
      dockerfile: .ci/Dockerfile.cypress
    entrypoint: bash # cypress run --env BASE_URL=front_test:3000 --project .
    working_dir: /app
    networks:
      - cinetwork
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY
      - CYPRESS_FRONT_URL=front_test:3000
    depends_on:
      - front_test
  rosbridge_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/rosbridge/Dockerfile
  planner_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/planner/Dockerfile
  pulse_sequence_controller_test:
    networks:
      - cinetwork
    build:
      context: ..
      dockerfile: ros2_ws/src/pulse_sequence_controller/Dockerfile

networks:
  cinetwork:
    name: cinetwork
    driver: bridge