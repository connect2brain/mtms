version: '2'

services:
  efield:
    build:
      context: .
      dockerfile: src/efield/Dockerfile.cuda2
    env_file:
      - ${MTMS_ENV_FILE}
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - './data/neuronavigation:/app/data/neuronavigation/'
    network_mode: host
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Doesn't work as of Mar 2026; needs to be run outside of Docker.
  mtms_device_bridge:
    build:
      context: .
      dockerfile: src/mtms_device_bridge/Dockerfile
    # The container needs to be privileged to access FPGA.
    privileged: true
    env_file:
      - ${MTMS_ENV_FILE}
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    network_mode: host
